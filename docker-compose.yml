version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: looca-postgres
    environment:
      POSTGRES_USER: looca
      POSTGRES_PASSWORD: looca
      POSTGRES_DB: looca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U looca"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: looca-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: looca-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Python Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: looca-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://looca:looca@postgres:5432/looca
      SECRET_KEY: looca-docker-secret-change-in-prod
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      VAPI_PRIVATE_KEY: ${VAPI_PRIVATE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: looca-frontend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://looca:looca@postgres:5432/looca
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_SECRET: looca-docker-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
